<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>snake3d</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
        color: #e6edf3;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #board-canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        z-index: 0;
      }
      .hud {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10;
        width: 240px;
        max-height: calc(100vh - 32px);
        overflow: auto;
        padding: 16px;
        border-radius: 16px;
        background: rgba(16, 20, 30, 0.72);
        border: 1px solid rgba(120, 140, 170, 0.18);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      .hud h1 {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        margin: 0 0 2px;
      }
      .subtitle {
        color: #9aa7b4;
        font-size: 0.72rem;
        margin: 0 0 14px;
      }
      .code-label {
        text-transform: uppercase;
        font-size: 0.6rem;
        letter-spacing: 0.16em;
        color: #6f7d8c;
        margin: 0 0 2px;
      }
      #room-code {
        font-size: 1.7rem;
        font-weight: 700;
        letter-spacing: 0.3rem;
        font-variant-numeric: tabular-nums;
        margin: 0 0 12px;
      }
      #qr-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 8px;
      }
      #qr-canvas {
        width: 150px;
        height: 150px;
        background: #fff;
        border-radius: 10px;
        padding: 8px;
      }
      #join-url {
        color: #58a6ff;
        word-break: break-all;
        font-size: 0.66rem;
        margin-bottom: 12px;
      }
      .players {
        text-align: left;
        margin-bottom: 12px;
      }
      .players h2 {
        font-size: 0.78rem;
        font-weight: 600;
        border-bottom: 1px solid rgba(120, 140, 170, 0.18);
        padding-bottom: 6px;
        margin: 0 0 8px;
      }
      #player-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      #player-list li {
        padding: 7px 10px;
        background: rgba(120, 140, 170, 0.1);
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 0.82rem;
      }
      #player-empty {
        color: #6f7d8c;
        font-style: italic;
        font-size: 0.74rem;
        margin: 0;
      }
      #start-button,
      #restart-button {
        width: 100%;
        font-size: 0.92rem;
        font-weight: 600;
        padding: 11px 16px;
        border: none;
        border-radius: 10px;
        background: #4ade80;
        color: #06210f;
        cursor: pointer;
      }
      #start-button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      #start-button.hidden,
      #gameover-card.hidden {
        display: none;
      }
      #gameover-card {
        margin-top: 4px;
      }
      .gameover-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0 0 4px;
        color: #f87171;
      }
      #gameover-detail {
        color: #9aa7b4;
        margin: 0 0 10px;
        font-size: 0.8rem;
      }
      #status {
        margin: 12px 0 0;
        font-size: 0.68rem;
        color: #6f7d8c;
      }
    </style>
  </head>
  <body>
    <canvas id="board-canvas"></canvas>

    <aside class="hud">
      <h1>snake3d</h1>
      <p class="subtitle">Scan to join from your phone</p>

      <p class="code-label">Room code</p>
      <p id="room-code">····</p>

      <div id="qr-wrap">
        <canvas id="qr-canvas"></canvas>
      </div>
      <div id="join-url"></div>

      <section class="players">
        <h2>Players (<span id="player-count">0</span>)</h2>
        <ul id="player-list"></ul>
        <p id="player-empty">Waiting for someone to join…</p>
      </section>

      <div id="lifecycle">
        <button id="start-button" type="button" disabled>Start game</button>
        <div id="gameover-card" class="hidden">
          <p class="gameover-title">Game over</p>
          <p id="gameover-detail"></p>
          <button id="restart-button" type="button">Play again</button>
        </div>
      </div>

      <p id="status">Connecting…</p>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
